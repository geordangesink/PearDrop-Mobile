name: Build Mobile Store Releases

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build/submit profile
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      build_ios:
        description: Build iOS
        required: true
        default: true
        type: boolean
      build_android:
        description: Build Android
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: read

concurrency:
  group: mobile-build-store-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build iOS (EAS)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios }}
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.capture.outputs.build_id }}
      build_number: ${{ steps.capture.outputs.build_number }}
      app_version: ${{ steps.capture.outputs.app_version }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify EAS auth
        run: |
          for key in EXPO_TOKEN EAS_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              exit 1
            fi
          done
          npx --yes eas-cli whoami

      - name: Link EAS project
        run: |
          npx --yes eas-cli project:init --id "$EAS_PROJECT_ID" --force --non-interactive

      - name: Build iOS with EAS
        run: |
          set -euo pipefail
          npx --yes eas-cli build --platform ios --profile "$EAS_PROFILE" --non-interactive --wait --json > ios-build.json
          cat ios-build.json

      - name: Capture iOS build metadata
        id: capture
        run: |
          set -euo pipefail
          build_id="$(jq -r 'if type=="array" then .[0].id // empty else .id // empty end' ios-build.json)"
          build_number="$(jq -r 'if type=="array" then .[0].buildNumber // empty else .buildNumber // empty end' ios-build.json)"
          app_version="$(jq -r 'if type=="array" then .[0].appVersion // empty else .appVersion // empty end' ios-build.json)"
          if [ -z "$build_id" ]; then
            echo "Failed to extract iOS build id from ios-build.json"
            exit 1
          fi
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Upload iOS build metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-build-metadata
          path: ios-build.json
          if-no-files-found: error

  build-android:
    name: Build Android (EAS)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.capture.outputs.build_id }}
      version_code: ${{ steps.capture.outputs.version_code }}
      app_version: ${{ steps.capture.outputs.app_version }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
      EAS_BUILD_NO_EXPO_GO_WARNING: 'true'
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify EAS auth
        run: |
          for key in EXPO_TOKEN EAS_PROJECT_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing secret: $key"
              exit 1
            fi
          done
          npx --yes eas-cli whoami

      - name: Link EAS project
        run: |
          npx --yes eas-cli project:init --id "$EAS_PROJECT_ID" --force --non-interactive

      - name: Build Android with EAS
        run: |
          set -euo pipefail
          npx --yes eas-cli build --platform android --profile "$EAS_PROFILE" --non-interactive --wait --json > android-build.json
          cat android-build.json

      - name: Capture Android build metadata
        id: capture
        run: |
          set -euo pipefail
          build_id="$(jq -r 'if type=="array" then .[0].id // empty else .id // empty end' android-build.json)"
          version_code="$(jq -r 'if type=="array" then .[0].versionCode // empty else .versionCode // empty end' android-build.json)"
          app_version="$(jq -r 'if type=="array" then .[0].appVersion // empty else .appVersion // empty end' android-build.json)"
          if [ -z "$build_id" ]; then
            echo "Failed to extract Android build id from android-build.json"
            exit 1
          fi
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

      - name: Upload Android build metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-build-metadata
          path: android-build.json
          if-no-files-found: error

  build-summary:
    name: Build Summary
    if: ${{ always() }}
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Build IDs
        run: |
          if [ "${{ needs.build-ios.result }}" = "success" ]; then
            echo "iOS build id:     ${{ needs.build-ios.outputs.build_id }}"
            echo "iOS version/build:${{ needs.build-ios.outputs.app_version }} (${{ needs.build-ios.outputs.build_number }})"
          else
            echo "iOS build:        ${{ needs.build-ios.result }}"
          fi

          if [ "${{ needs.build-android.result }}" = "success" ]; then
            echo "Android build id: ${{ needs.build-android.outputs.build_id }}"
            echo "Android version:  ${{ needs.build-android.outputs.app_version }} (code ${{ needs.build-android.outputs.version_code }})"
          else
            echo "Android build:    ${{ needs.build-android.result }}"
          fi
